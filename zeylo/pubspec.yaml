name: zeylo
description: A community-driven platform for discovering, sharing, and booking local experiences.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0
  firebase_messaging: ^16.1.2

  # State Management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^17.1.0

  # Image Loading & Caching
  cached_network_image: ^3.4.1

  # Image Picker
  image_picker: ^1.2.1

  # Location Servicesf
  geolocator: ^14.0.2
  geocoding: ^4.0.0


  # Internationalization & Formatting
  intl: any

  # Rating Component
  flutter_rating_bar: ^4.0.1

  # Loading Shimmer Effect
  shimmer: ^3.0.0

  # Share Functionality
  share_plus: ^12.0.1

  # URL Launcher
  url_launcher: ^6.3.1

  # Local Notifications
  flutter_local_notifications: ^21.0.0

  # JSON Serialization
  json_annotation: ^4.9.0
  freezed_annotation: ^3.1.0

  # Secure Storage
  flutter_secure_storage: ^10.0.0

  # Connectivity
  connectivity_plus: ^7.0.0

  # SVG Support
  flutter_svg: ^2.0.17

  # Social Sign-In
  google_sign_in: ^6.2.0
  sign_in_with_apple: ^6.1.3

  # Functional Programming
  dartz: ^0.10.1
  fpdart: ^1.1.0

  # Value Equality
  equatable: ^2.0.7
  http: ^1.6.0
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  google_maps_flutter: ^2.15.0
  table_calendar: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  json_serializable: ^6.9.4
  freezed: ^3.2.5

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/illustrations/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

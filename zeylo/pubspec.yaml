name: zeylo
description: A community-driven platform for discovering, sharing, and booking local experiences.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  firebase_messaging: ^15.2.4

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Image Loading & Caching
  cached_network_image: ^3.4.1

  # Image Picker
  image_picker: ^1.1.2

  # Location Services
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Maps
  google_maps_flutter: ^2.12.1

  # Internationalization & Formatting
  intl: any

  # Rating Component
  flutter_rating_bar: ^4.0.1

  # Loading Shimmer Effect
  shimmer: ^3.0.0

  # Share Functionality
  share_plus: ^12.0.1

  # URL Launcher
  url_launcher: ^6.3.1

  # Local Notifications
  flutter_local_notifications: ^19.0.0

  # JSON Serialization
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

  # Secure Storage
  flutter_secure_storage: ^9.2.4

  # Connectivity
  connectivity_plus: ^6.1.3

  # SVG Support
  flutter_svg: ^2.0.17

  # Social Sign-In
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4

  # Functional Programming
  dartz: ^0.10.1
  fpdart: ^1.1.0

  # Value Equality
  equatable: ^2.0.7
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  json_serializable: ^6.9.4
  freezed: ^2.5.8

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/illustrations/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

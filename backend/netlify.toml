[build]
  functions = "netlify/functions"

# Redirect /api/ai/enhance  → the enhance function
[[redirects]]
  from   = "/api/ai/enhance"
  to     = "/.netlify/functions/ai-enhance"
  status = 200

# Redirect /api/ai/chain/generate  → the chain generation function
[[redirects]]
  from   = "/api/ai/chain/generate"
  to     = "/.netlify/functions/ai-chain-generate"
  status = 200